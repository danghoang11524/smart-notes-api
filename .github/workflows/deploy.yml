name: Deploy Smart Notes API

on:
  push:
    branches:
      - main
  workflow_dispatch: {}   # cho phép bấm "Run workflow" thủ công trên GitHub khi cần

permissions:
  id-token: write   # bắt buộc để lấy OIDC token
  contents: read

env:
  AWS_REGION: ap-southeast-1
  STACK_NAME: smart-notes-api
  STAGE_NAME: dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python (required by AWS SAM CLI)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install AWS SAM CLI
        run: pip install aws-sam-cli

      - name: Debug - check secret reaches job
        run: |
          echo "Role ARN length: ${#ROLE_ARN}"
          echo "Role ARN (masked): ${ROLE_ARN:0:20}...${ROLE_ARN: -10}"
        env:
          ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: SAM build
        run: sam build

      - name: SAM deploy
        run: |
          sam deploy \
            --stack-name "${{ env.STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              StageName="${{ env.STAGE_NAME }}" \
              GoogleClientId="${{ secrets.GOOGLE_CLIENT_ID }}" \
              GoogleClientSecret="${{ secrets.GOOGLE_CLIENT_SECRET }}"